<!DOCTYPE html>
<html>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width,initial-scale=1'>
<title>Icon Options - THE CHATING</title>
<style>
body{background:#0d0f1a;font-family:sans-serif;color:#e8eaf0;text-align:center;padding:30px 20px}
h1{color:#6366f1;margin-bottom:6px;font-size:24px}
p{color:#94a3b8;margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px;max-width:860px;margin:0 auto}
.card{background:#1a1d30;border:2px solid #2a2d45;border-radius:20px;padding:18px 12px;cursor:pointer;transition:all .2s}
.card:hover{border-color:#6366f1;transform:scale(1.05);box-shadow:0 0 20px rgba(99,102,241,.3)}
svg{width:96px;height:96px;display:block;margin:0 auto 10px}
.name{font-size:14px;font-weight:700;color:#e8eaf0;margin-bottom:2px}
.num{font-size:12px;color:#6366f1;font-weight:700}
</style>
</head>
<body>
<h1>Choose Your App Icon</h1>
<p>Pick the one you like and tell me the number!</p>
<div class='grid'>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<rect width='100' height='100' rx='22' fill='#6366f1'/>
<path d='M20 30 Q20 20 30 20 L70 20 Q80 20 80 30 L80 58 Q80 68 70 68 L47 68 L32 80 L32 68 Q20 68 20 58 Z' fill='white'/>
</svg>
<div class='name'>Classic Chat</div><div class='num'>1</div>
</div>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<defs><linearGradient id='g2' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='#6366f1'/><stop offset='100%' stop-color='#ec4899'/></linearGradient></defs>
<rect width='100' height='100' rx='22' fill='url(#g2)'/>
<text x='50' y='67' font-size='50' text-anchor='middle' font-family='Georgia,serif' font-weight='900' fill='white'>TC</text>
</svg>
<div class='name'>TC Monogram</div><div class='num'>2</div>
</div>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<defs><linearGradient id='g3' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='#06b6d4'/><stop offset='100%' stop-color='#6366f1'/></linearGradient></defs>
<rect width='100' height='100' rx='22' fill='url(#g3)'/>
<circle cx='32' cy='50' r='9' fill='white'/>
<circle cx='50' cy='50' r='9' fill='white' opacity='.8'/>
<circle cx='68' cy='50' r='9' fill='white' opacity='.6'/>
</svg>
<div class='name'>Three Dots</div><div class='num'>3</div>
</div>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<defs><linearGradient id='g4' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='#10b981'/><stop offset='100%' stop-color='#3b82f6'/></linearGradient></defs>
<rect width='100' height='100' rx='22' fill='url(#g4)'/>
<path d='M18 28 Q18 18 28 18 L62 18 Q72 18 72 28 L72 52 Q72 62 62 62 L45 62 L33 73 L33 62 Q18 62 18 52 Z' fill='white' opacity='.95'/>
<path d='M36 42 Q36 34 44 34 L76 34 Q84 34 84 42 L84 62 Q84 70 76 70 L60 70 L50 79 L50 70 Q36 70 36 62 Z' fill='white' opacity='.45'/>
</svg>
<div class='name'>Double Bubble</div><div class='num'>4</div>
</div>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<defs><linearGradient id='g5' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='#8b5cf6'/><stop offset='100%' stop-color='#ec4899'/></linearGradient></defs>
<rect width='100' height='100' rx='50' fill='url(#g5)'/>
<text x='50' y='66' font-size='50' text-anchor='middle'>💬</text>
</svg>
<div class='name'>Emoji Circle</div><div class='num'>5</div>
</div>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<defs><linearGradient id='g6' x1='0%' y1='100%' x2='100%' y2='0%'><stop offset='0%' stop-color='#f59e0b'/><stop offset='100%' stop-color='#ef4444'/></linearGradient></defs>
<rect width='100' height='100' rx='22' fill='#0d0f1a'/>
<rect x='8' y='8' width='84' height='84' rx='18' fill='url(#g6)'/>
<text x='50' y='70' font-size='52' text-anchor='middle' font-family='Arial Black,sans-serif' font-weight='900' fill='white'>T</text>
</svg>
<div class='name'>Bold T</div><div class='num'>6</div>
</div>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<defs><radialGradient id='g7' cx='35%' cy='35%'><stop offset='0%' stop-color='#a78bfa'/><stop offset='100%' stop-color='#4f46e5'/></radialGradient></defs>
<rect width='100' height='100' rx='22' fill='url(#g7)'/>
<circle cx='50' cy='50' r='26' fill='none' stroke='white' stroke-width='4' opacity='.6'/>
<path d='M36 50 L46 60 L65 40' stroke='white' stroke-width='5' fill='none' stroke-linecap='round' stroke-linejoin='round'/>
</svg>
<div class='name'>Check Mark</div><div class='num'>7</div>
</div>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<defs><linearGradient id='g8' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='#0ea5e9'/><stop offset='100%' stop-color='#6366f1'/></linearGradient></defs>
<rect width='100' height='100' rx='22' fill='url(#g8)'/>
<polygon points='50,16 58,36 80,36 63,49 70,70 50,57 30,70 37,49 20,36 42,36' fill='white'/>
</svg>
<div class='name'>Star</div><div class='num'>8</div>
</div>

<div class='card'>
<svg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'>
<defs><linearGradient id='g9' x1='0%' y1='0%' x2='100%' y2='100%'><stop offset='0%' stop-color='#6366f1'/><stop offset='100%' stop-color='#06b6d4'/></linearGradient></defs>
<rect width='100' height='100' rx='22' fill='url(#g9)'/>
<rect x='22' y='36' width='56' height='9' rx='4.5' fill='white'/>
<rect x='22' y='52' width='40' height='9' rx='4.5' fill='white' opacity='.7'/>
<rect x='22' y='68' width='48' height='9' rx='4.5' fill='white' opacity='.5'/>
</svg>
<div class='name'>Message Lines</div><div class='num'>9</div>
</div>

</div>
<p style='margin-top:28px;font-size:14px;color:#64748b'>Reply with the number (1–9) you want!</p>
</body>
</html>
