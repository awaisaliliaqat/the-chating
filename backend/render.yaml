services:
  - type: web
    name: the-chating-backend
    runtime: python
    buildCommand: pip install -r requirements.txt && python -c "from database import init_db; init_db()"
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: FRONTEND_URL
        value: https://the-chating.vercel.app
